name: Update README

on:
  schedule:
    - cron: "0 0 * * *"   # Once every day (00:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update activity file
        run: |
          echo "Last update: $(date)" >> activity.log

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add activity.log

          git diff --cached --quiet || git commit -m "Daily activity update"

      - name: Push
        run: git push
