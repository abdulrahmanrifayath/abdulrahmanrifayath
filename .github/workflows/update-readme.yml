name: Update README

on:
  schedule:
    - cron: "0 0 * * *"   # Runs once every day at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "abdulrahmanrifayath"
          git config user.email "abdulrahmanrifayath264@gmail.com"

      - name: Generate 7-10 Random Commits
        run: |
          # Random number between 7 and 10
          COMMITS=$(( ( RANDOM % 4 ) + 7 ))

          echo "Creating $COMMITS commits..."

          for ((i=1; i<=COMMITS; i++))
          do
            echo "$(date) - Automatic activity $i" >> activity.log

            git add activity.log

            git commit -m "Automatic activity update #$i"

            # Small delay so each commit has a different timestamp
            sleep 2
          done

      - name: Push Changes
        run: |
          git push
